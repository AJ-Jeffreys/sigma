title: RDP Connection With Suspicious Password Spray Pattern
id: e57d6ae8-b4dc-45d6-a07f-7ae02e42a044
status: experimental
description: Detects RDP connections that exhibit characteristics of password spraying attacks by identifying multiple failed authentication attempts followed by a successful logon within a short time window from the same source IP
references:
    - https://attack.mitre.org/techniques/T1021/001/
    - https://www.microsoft.com/en-us/security/blog/2020/04/23/protecting-organization-password-spray-attacks/
author: AJ Jeffreys
date: 2026/05/04
tags:
    - attack.lateral_movement
    - attack.t1021.001
logsource:
    product: windows
    service: security
detection:
    selection_failed:
        EventID: 4625
        LogonType: 10
        Status: '0xc000006d'  # Bad username or password
        IpAddress|re: '^(?!127\.0\.0\.1$|^::1$).*'  # Exclude localhost
    selection_success:
        EventID: 4624
        LogonType: 10
        IpAddress|re: '^(?!127\.0\.0\.1$|^::1$).*'  # Exclude localhost
    timeframe: 10m
    condition: selection_failed | count(IpAddress) by IpAddress >= 5 and selection_success | count(IpAddress) by IpAddress >= 1
falsepositives:
    - Legitimate users with forgotten passwords attempting multiple logons
    - Automated systems with credential rotation issues
    - Load balancers or proxy systems that may aggregate connections
level: high
related:
    - id: 954f0af7-62dd-418f-b3df-a84bc2c7a774
      type: similar